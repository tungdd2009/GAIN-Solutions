<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lesson Architect</title>

<!-- Replace the <style> section in index.html -->
<style>
:root {
    --primary: #6366f1; /* Indigo */
    --primary-hover: #4f46e5;
    --secondary: #10b981; /* Emerald */
    --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    --glass: rgba(255, 255, 255, 0.8);
    --glass-border: rgba(255, 255, 255, 0.4);
    --text-main: #1e293b;
    --text-muted: #64748b;
    --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
}

body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: var(--text-main);
    display: flex;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 20px;
}

.app {
    max-width: 1000px;
    width: 100%;
    background: var(--glass);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
}

/* HEADER RE-DESIGN */
.app-header {
    padding: 40px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.brand h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.025em;
    background: linear-gradient(to right, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin: 0;
}
img {
    width: 20%;
    height: 20%;
    object-fit: cover;
}

/* SECTION RE-DESIGN */
.content { padding: 40px; }

.section {
    margin-bottom: 48px;
    animation: fadeIn 0.5s ease-out forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.section h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--primary);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.section h2::after {
    content: "";
    height: 1px;
    flex-grow: 1;
    background: #e2e8f0;
}

/* FORM INPUTS RE-DESIGN */
.row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; }

label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 8px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    background: white;
    transition: all 0.2s;
    font-size: 15px;
}

input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
}

/* BUTTON RE-DESIGN */
button {
    background: var(--primary);
    padding: 18px;
    border-radius: 16px;
    font-size: 18px;
    font-weight: 700;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
}

button:hover:not(:disabled) {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
}

button:disabled {
    background: #cbd5e1;
    box-shadow: none;
}

/* RANGE SLIDER */
input[type=range] {
    accent-color: var(--primary);
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">

    <!-- HEADER -->
    <div class="app-header">
        <div class="brand">
            <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
            <div>
                <h1 data-i18n="title"></h1>
                <p data-i18n="subtitle"></p>
            </div>
        </div>

        <div class="lang-toggle">
            <select id="langSelect">
                <option value="VN">🇻🇳 VN</option>
                <option value="EN">🇬🇧 EN</option>
            </select>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <div class="section">
            <h2 data-i18n="section1"></h2>
            <p data-i18n="section1_desc"></p>

            <div class="row">
                <div class="col">
                    <label data-i18n="topic"></label>
                    <input id="topic" data-i18n-placeholder="topic_ph">
                </div>
                <div class="col">
                    <label data-i18n="grade"></label>
                    <select id="grade">
                        <option>K-5</option>
                        <option>6-8</option>
                        <option selected>9-12</option>
                        <option>University</option>
                    </select>
                </div>
            </div>

            <label>
                <span data-i18n="slides"></span>:
                <strong><span id="slideValue">5</span></strong>
            </label>
            <input type="range" id="slideCount" min="3" max="16" value="5">
            <small data-i18n="slides_hint"></small>
        </div>

        <div class="section context">
            <h2 data-i18n="section2"></h2>
            <p data-i18n="section2_desc"></p>

            <!-- Row 1 -->
            <div class="row">
                <div class="col">
                    <label data-i18n="method"></label>
                    <select id="method">
                        <option value="traditional" data-i18n="method_traditional"></option>
                        <option value="steam" data-i18n="method_steam"></option>
                        <option value="interactive" data-i18n="method_interactive"></option>
                    </select>
                </div>

                <div class="col">
                    <label data-i18n="teacher_age"></label>
                    <input
                        type="number"
                        id="teacherAge"
                        min="20"
                        max="70"
                        value="30"
                        placeholder="30"
                    />
                    <small data-i18n="teacher_age_hint"></small>
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row">
                <div class="col">
                    <label data-i18n="region"></label>
                    <select id="region">
                        <option value="north" data-i18n="region_north"></option>
                        <option value="central" data-i18n="region_central"></option>
                        <option value="south" data-i18n="region_south"></option>
                    </select>
                </div>

                <div class="col">
                    <label data-i18n="area_type"></label>
                    <select id="areaType">
                        <option value="urban" data-i18n="area_urban"></option>
                        <option value="rural" data-i18n="area_rural"></option>
                        <option value="mountain" data-i18n="area_mountain"></option>
                        <option value="coastal" data-i18n="area_coastal"></option>
                    </select>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row">
                <div class="col">
                    <label data-i18n="student_context"></label>
                    <textarea
                        id="studentContext"
                        rows="3"
                        data-i18n-placeholder="student_context_ph"
                    ></textarea>
                    <small data-i18n="student_context_hint"></small>
                </div>
            </div>
        </div>


        <button id="generate" disabled data-i18n="generate"></button>
        <div id="status"></div>

    </div>
</div>

<script>
/* === TRANSLATIONS === */
const TEXT = {
    VN: {
        title: "AI Lesson Architect",
        subtitle: "Trợ lý AI giúp giáo viên soạn bài nhanh và hiệu quả",
        section1: "1. Thông tin bài học",
        section1_desc: "Nhập thông tin chính để AI hiểu đúng mục tiêu bài giảng.",
        topic: "Chủ đề bài học",
        topic_ph: "Ví dụ: Quang hợp ở thực vật",
        grade: "Cấp học",
        slides: "Số lượng slide",
        slides_hint: "Gợi ý: 5–7 slide cho một tiết học 45 phút",
        section2: "2. Bối cảnh giảng dạy",
        section2_desc: "Thông tin bổ sung giúp bài giảng phù hợp hơn với lớp học.",
        method: "Phương pháp giảng dạy",
        method_traditional: "Giảng dạy truyền thống",
        method_steam: "STEAM / Dạy học dự án",
        method_interactive: "Tương tác – hoạt động",
        generate: "🚀 Tạo bài giảng bằng AI",
        status: "Đang tạo bài giảng...",
        teacher_age: "Tuổi giáo viên",
        teacher_age_hint: "Giúp AI điều chỉnh cách diễn đạt và ví dụ phù hợp",
        region: "Khu vực",
        region_north: "Miền Bắc",
        region_central: "Miền Trung",
        region_south: "Miền Nam",
        area_type: "Khu vực sinh sống",
        area_urban: "Thành thị",
        area_rural: "Nông thôn",
        area_mountain: "Miền núi",
        area_coastal: "Ven biển",
        student_context: "Bối cảnh đời sống học sinh",
        student_context_ph: "Ví dụ: gia đình làm nông, sống gần chợ, khu công nghiệp...",
        student_context_hint: "AI sẽ dùng các ví dụ quen thuộc với đời sống học sinh",
        error: "Lỗi: ",
        success: "✅ Bài giảng đã được tạo thành công!",
        downloading: "Đang tải xuống..."
    },
    EN: {
        title: "AI Lesson Architect",
        subtitle: "AI assistant for faster and clearer lesson planning",
        section1: "1. Lesson information",
        section1_desc: "Provide core information so AI understands your teaching goals.",
        topic: "Lesson topic",
        topic_ph: "e.g. Photosynthesis in plants",
        grade: "Grade level",
        slides: "Number of slides",
        slides_hint: "Recommended: 5–7 slides for a 45-minute class",
        section2: "2. Teaching context",
        section2_desc: "Optional inputs to better personalize the lesson.",
        method: "Teaching method",
        method_traditional: "Traditional lecture",
        method_steam: "STEAM / Project-based",
        method_interactive: "Interactive learning",
        generate: "🚀 Generate lesson with AI",
        status: "Generating lesson...",
        teacher_age: "Teacher age",
        teacher_age_hint: "Helps AI adjust tone and examples",
        region: "Region",
        region_north: "Northern Vietnam",
        region_central: "Central Vietnam",
        region_south: "Southern Vietnam",
        area_type: "Living area",
        area_urban: "Urban",
        area_rural: "Rural",
        area_mountain: "Mountainous",
        area_coastal: "Coastal",
        student_context: "Student life context",
        student_context_ph: "e.g. farming families, market life, industrial zones...",
        student_context_hint: "AI will use familiar real-life examples",
        error: "Error: ",
        success: "✅ Lesson generated successfully!",
        downloading: "Downloading..."
    }
};

/* === STATE === */
let currentLang = "VN";

/* === ELEMENTS === */
const slide = document.getElementById("slideCount");
const slideValue = document.getElementById("slideValue");
const topic = document.getElementById("topic");
const btn = document.getElementById("generate");
const status = document.getElementById("status");
const langSelect = document.getElementById("langSelect");

/* === FUNCTIONS === */
function applyLang(lang) {
    currentLang = lang;
    const t = TEXT[lang];

    document.querySelectorAll("[data-i18n]").forEach(el => {
        el.textContent = t[el.dataset.i18n];
    });

    document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
        el.placeholder = t[el.dataset.i18nPlaceholder];
    });
}

function showStatus(message, type = 'info') {
    status.style.display = "block";
    status.className = type;
    
    if (type === 'loading') {
        status.innerHTML = `<span class="spinner"></span>${message}`;
        status.className = '';
    } else {
        status.textContent = message;
    }
}

function hideStatus() {
    status.style.display = "none";
}

function downloadPPTX(base64Data, filename) {
    const binary = atob(base64Data);
    const array = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        array[i] = binary.charCodeAt(i);
    }
    const blob = new Blob([array], { 
        type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' 
    });
    
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

/* === EVENTS === */
slide.oninput = () => slideValue.textContent = slide.value;
topic.oninput = () => btn.disabled = !topic.value.trim();

langSelect.onchange = () => applyLang(langSelect.value);

btn.onclick = async () => {
    const topicValue = topic.value.trim();
    
    if (!topicValue) {
        showStatus(TEXT[currentLang].error + "Please enter a topic", 'error');
        return;
    }

    btn.disabled = true;
    showStatus(TEXT[currentLang].status, 'loading');

    try {
        const payload = {
            topic: topicValue,
            grade: document.getElementById("grade").value,
            slideCount: parseInt(slide.value),
            teacherAge: parseInt(document.getElementById("teacherAge").value) || 30,
            region: document.getElementById("region").value,
            areaType: document.getElementById("areaType").value,
            method: document.getElementById("method").value,
            studentContext: document.getElementById("studentContext").value.trim(),
            language: currentLang
        };

        const response = await fetch('/api/generate', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || 'Failed to generate lesson');
        }

        if (data.success && data.file) {
            showStatus(TEXT[currentLang].success, 'success');
            
            // Download the file
            const filename = `${topicValue.replace(/[^a-z0-9]/gi, '_')}_lesson.pptx`;
            downloadPPTX(data.file, filename);
            
            setTimeout(() => {
                hideStatus();
                btn.disabled = false;
            }, 3000);
        } else {
            throw new Error('Invalid response from server');
        }

    } catch (error) {
        console.error('Generation error:', error);
        showStatus(TEXT[currentLang].error + error.message, 'error');
        btn.disabled = false;
    }
};

/* === INIT === */
applyLang("VN");
langSelect.value = "VN";
</script>

</body>
</html>
